name: Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}-backend:${{ github.ref_name }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}-frontend:${{ github.ref_name }}

# After this runs, redeploy your Railway/Render/ECS service pointing at the new image tag.
# (Wiring an automatic redeploy trigger depends on which host you use -- e.g. Railway's
# CLI/API, Render's deploy hook URL, or an ECS `update-service --force-new-deployment`
# step added here once you've picked a host.)
